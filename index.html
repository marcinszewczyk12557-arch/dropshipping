<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dropshipping - Mega Menu</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: Arial, sans-serif; background:#f8f9fa; }

  /* Navbar */
  nav { background:#007BFF; color:white; position:sticky; top:0; z-index:1000; }
  nav .nav-container { display:flex; justify-content:space-between; align-items:center; padding:1rem; }
  nav h1 { font-size:1.5rem; }
  .menu-toggle { display:none; font-size:1.5rem; cursor:pointer; }

  ul.menu { list-style:none; display:flex; gap:1rem; }
  ul.menu li { position:relative; }
  ul.menu li a { color:white; text-decoration:none; padding:0.5rem 1rem; display:block; }
  ul.menu li a:hover { background:rgba(255,255,255,0.2); border-radius:5px; }

  /* Mega menu */
  .mega { display:none; position:absolute; left:0; top:100%; width:100vw; background:white; color:black; padding:1rem; box-shadow:0 4px 6px rgba(0,0,0,0.1); }
  .mega .category { display:flex; flex-wrap:wrap; gap:1rem; }
  .mega .product { width:150px; text-align:center; }
  .mega .product img { width:100%; border-radius:5px; }
  .mega .product p { margin-top:0.5rem; font-size:0.9rem; }

  /* Hover to show mega menu */
  ul.menu li:hover .mega { display:flex; }

  /* Mobile */
  @media(max-width:768px){
    .menu-toggle{ display:block; }
    ul.menu { display:none; flex-direction:column; width:100%; }
    ul.menu.show { display:flex; }
    .mega { position:static; width:100%; flex-wrap:wrap; padding:0.5rem 0; box-shadow:none; display:none; }
    ul.menu li.show-mega .mega { display:flex; flex-wrap:wrap; gap:0.5rem; }
  }

  section { padding:2rem; border-bottom:1px solid #ddd; background:white; margin:0.5rem; border-radius:5px; }
  section h2 { margin-bottom:1rem; color:#007BFF; }
</style>
</head>
<body>

<nav>
  <div class="nav-container">
    <h1>Dropshipping</h1>
    <span class="menu-toggle">&#9776;</span>
    <ul class="menu">
      <li>
        <a href="#elektronika">Elektronika użytkowa</a>
        <div class="mega">
          <div class="category">
            <div class="product"><img src="placeholder1.jpg" alt="Produkt 1"><p>Produkt 1</p></div>
            <div class="product"><img src="placeholder2.jpg" alt="Produkt 2"><p>Produkt 2</p></div>
            <div class="product"><img src="placeholder3.jpg" alt="Produkt 3"><p>Produkt 3</p></div>
          </div>
        </div>
      </li>
      <li>
        <a href="#bezpieczenstwo">Bezpieczeństwo</a>
        <div class="mega">
          <div class="category">
            <div class="product"><img src="placeholder4.jpg" alt="Produkt 4"><p>Produkt 4</p></div>
            <div class="product"><img src="placeholder5.jpg" alt="Produkt 5"><p>Produkt 5</p></div>
            <div class="product"><img src="placeholder6.jpg" alt="Produkt 6"><p>Produkt 6</p></div>
          </div>
        </div>
      </li>
      <!-- Dodaj więcej kategorii podobnie -->
    </ul>
  </div>
</nav>

<div class="content">
  <section id="elektronika"><h2>Elektronika użytkowa</h2><p>Wstaw tutaj swoje produkty.</p></section>
  <section id="bezpieczenstwo"><h2>Bezpieczeństwo</h2><p>Wstaw tutaj swoje produkty.</p></section>
  <!-- Dodaj sekcje dla pozostałych kategorii -->
</div>

<script>
  const toggle = document.querySelector('.menu-toggle');
  const menu = document.querySelector('ul.menu');
  toggle.addEventListener('click', ()=> menu.classList.toggle('show'));

  // Mobile: kliknięcie kategorii pokazuje mega menu
  const menuItems = document.querySelectorAll('ul.menu > li > a');
  menuItems.forEach(item=>{
    item.addEventListener('click', e=>{
      if(window.innerWidth<=768){
        e.preventDefault();
        const parent = item.parentElement;
        parent.classList.toggle('show-mega');
      }
    });
  });
</script>

</body>
</html>
